---
  - name: General | Load varibles
    include_vars:
      file: vars.yml

  - name: Jenkins | Install Master | add jenkins apt-key
    apt_key:
      url: https://pkg.jenkins.io/debian-stable/jenkins.io.key
      state: present
    become: true
    become_method: sudo
    
  - name: Jenkins | Install Master | configure the repository
    apt_repository:
      repo: 'deb https://pkg.jenkins.io/debian-stable binary/'
      state: present
    become: true
    become_method: sudo

  - name: Jenkins | Install Master | install jenkins
    apt:
      name: jenkins
      update_cache: yes
    become: true
    become_method: sudo

  - name: Set Jenkins command line options
    lineinfile:
      dest: /etc/default/jenkins
      regexp: '^JAVA_ARGS='
      line: "JAVA_ARGS=\"{{ jenkins_java_opts }}\""
      notify:
      - restart jenkins
    become: true
    become_method: sudo    